name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: crates/dashboard/frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: crates/dashboard/frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: crates/dashboard/frontend
        run: pnpm build

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo build
        run: cargo build --workspace

      - name: cargo test
        run: cargo test --workspace

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

  # Proves the rust-version declared in Cargo.toml actually compiles. Skips the
  # frontend build on purpose: without frontend/dist the dashboard build script
  # embeds a placeholder page, which is enough for a language-level check and
  # keeps this job free of the node/pnpm toolchain.
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.86

      - uses: Swatinem/rust-cache@v2

      - name: cargo check (MSRV)
        run: cargo check --workspace --locked
