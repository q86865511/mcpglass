name: Release

on:
  push:
    tags: ['v*']

env:
  # crates/dashboard/build.rs: fail the build instead of silently embedding a
  # placeholder page when the frontend bundle is missing (see build.rs).
  MCPGLASS_REQUIRE_FRONTEND: "1"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: crates/dashboard/frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: crates/dashboard/frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: crates/dashboard/frontend
        run: pnpm build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: cargo build --release
        run: cargo build --release --target ${{ matrix.target }} -p cli

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          stage="mcpglass-v${version}-${{ matrix.target }}"
          mkdir "$stage"
          cp "target/${{ matrix.target }}/release/mcpglass" "$stage/"
          cp LICENSE README.md "$stage/"
          tar -czf "${stage}.tar.gz" "$stage"
          echo "ASSET=${stage}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          $stage = "mcpglass-v$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/mcpglass.exe" "$stage/"
          Copy-Item LICENSE, README.md "$stage/"
          Compress-Archive -Path "$stage/*" -DestinationPath "$stage.zip"
          Add-Content -Path $env:GITHUB_ENV -Value "ASSET=$stage.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: mcpglass-${{ matrix.target }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: mcpglass-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/mcpglass-sbom.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "dist/*"

      - name: Determine prerelease flag
        id: prerelease
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-rc* || "${GITHUB_REF_NAME}" == *-pre* ]]; then
            echo "flag=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "mcpglass ${GITHUB_REF_NAME}" \
            --notes "See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/master/CHANGELOG.md) for details. Verify downloads against \`SHA256SUMS\` and the attached build provenance attestation (\`gh attestation verify\`)." \
            ${{ steps.prerelease.outputs.flag }}
